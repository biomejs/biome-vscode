name: 🧪 Integrate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  quality:
    name: Quality
    runs-on: depot-ubuntu-24.04-arm-16
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Biome
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2
      - name: Run Biome checks
        run: biome ci --reporter=github
      - name: Setup PNPM
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6
        with:
          cache: true
          run_install: true
      - name: Typecheck
        run: pnpm run typecheck
  
  build:
    name: Build
    runs-on: depot-ubuntu-24.04-arm-16
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Setup PNPM
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6
        with:
          cache: true
          run_install: true
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.node-version'
      - name: Build
        run: pnpm run build
      - name: Package
        run: pnpm package