name: 🚀 Release new stable version

on: [workflow_dispatch]

jobs:

  publish:
    name: Publish
    runs-on: depot-ubuntu-24.04-arm-16
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions: 
      contents: write
      packages: write
      statuses: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup PNPM
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: true
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - name: Install dependencies
        run: pnpm install
        env:
          CXXFLAGS: "-std=c++20"
      - name: Consume changesets
        run: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Retrieve updated version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changeset package.json CHANGELOG.md
          git commit -m "chore(release): v${{ steps.version.outputs.version }}"
          git tag -a v${{ steps.version.outputs.version }} -m "v${{ steps.version.outputs.version }}"
          git push --follow-tags
      - name: Build extension
        run: pnpm run build
      - name: Package stable extension
        run: pnpm vsce package -o biome.vsix
      - name: Publish to Visual Studio Marketplace
        run: pnpm vsce publish --packagePath biome.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      - name: Publish to Open VSX Registry
        run: pnpm exec ovsx publish --packagePath biome.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  # Publish pre-release after stable release is published to ensure that the
  # pre-release never falls behind the stable release.
  publish-prerelease:
    name: Publish pre-release
    needs: publish
    uses: ./.github/workflows/release-prerelease.yaml
    with:
      ref: refs/tags/v${{ needs.publish.outputs.version }}
    secrets: inherit
      
